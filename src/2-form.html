<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gallery</title>
    <link rel="stylesheet" href="./css/2-form.css" />
    <script type="module" src="./js/2-form.js"></script>
  </head>
  <body>
  <form class="feedback-form" autocomplete="off">
    <label class="feedback-form-label">
      Email
      <input class="feedback-form-input" type="email" name="email" autofocus />
    </label>
    <label class="feedback-form-label">
      Message
      <textarea class="feedback-form-message" name="message" rows="4"></textarea>
    </label>
    <button class="feedback-form-submit" type="submit">Submit</button>
  </form>
  </body>
</html>
